<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cartellone</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: black; overflow: hidden; }
        #schermo { 
            width: 100%; height: 100%; 
            background-size: contain; background-repeat: no-repeat; background-position: center; 
            display: flex; align-items: flex-end; 
        }
        #barra-testo { 
            width: 100%; background: rgba(0,0,0,0.8); color: white; 
            font-family: sans-serif; font-size: 40px; text-align: center; padding: 20px; 
        }
    </style>
</head>
<body>
    <div id="schermo">
        <div id="barra-testo">Inizializzazione...</div>
    </div>

    <script>
        // IL TUO LINK TSV
        var urlFoglio = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRrZmErsS9XHRJG8Yrb8RmC2bJNL0SFv6fcyA5Zu2tQNw1zNDM3kYxlCx3DB6zjovcGQeKP5X8WnOlK/pub?output=tsv";

        function caricaDati() {
            var xhr = new XMLHttpRequest();
            xhr.open("GET", urlFoglio + "&t=" + new Date().getTime(), true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState == 4 && xhr.status == 200) {
                    var righe = xhr.responseText.split("\n");
                    var pubblicita = [];
                    
                    // Prendi la location dall'URL
                    var locCercata = window.location.search.split("location=")[1];
                    if(!locCercata) {
                        document.getElementById("barra-testo").innerHTML = "Errore: scrivi ?location=... nell'indirizzo";
                        return;
                    }
                    locCercata = locCercata.toLowerCase();

                    for (var i = 1; i < righe.length; i++) {
                        var colonne = righe[i].split("\t");
                        if (colonne[0].trim().toLowerCase() == locCercata) {
                            pubblicita.push({
                                img: colonne[1].trim(),
                                txt: colonne[2] ? colonne[2].trim() : "",
                                dur: parseInt(colonne[3]) || 5000
                            });
                        }
                    }

                    if (pubblicita.length > 0) {
                        avviaCiclo(pubblicita);
                    } else {
                        document.getElementById("barra-testo").innerHTML = "Nessuna riga trovata per: " + locCercata;
                    }
                }
            };
            xhr.send();
        }

        var indice = 0;
        function avviaCiclo(lista) {
            var ad = lista[indice];
            var divSchermo = document.getElementById("schermo");
            var divTesto = document.getElementById("barra-testo");

            // Cambio immagine
            divSchermo.style.backgroundImage = "url('" + ad.img + "')";
            
            // Cambio testo
            if (ad.txt != "") {
                divTesto.style.display = "block";
                divTesto.innerHTML = ad.txt;
            } else {
                divTesto.style.display = "none";
            }

            indice = (indice + 1) % lista.length;
            setTimeout(function() { avviaCiclo(lista); }, ad.dur);
        }

        caricaDati();
    </script>
</body>
</html>
