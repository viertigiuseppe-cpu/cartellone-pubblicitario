<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartellone Pubblicitario</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; color: white; font-family: Arial, sans-serif; }
        #ad-container { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; background-size: contain; background-repeat: no-repeat; background-position: center; }
        #ad-text { background: rgba(0, 0, 0, 0.8); padding: 30px; font-size: 40px; text-align: center; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="ad-container">
        <div id="ad-text">Caricamento...</div>
    </div>

    <script>
        const linkGoogleFoglio = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRrZmErsS9XHRJG8Yrb8RmC2bJNL0SFv6fcyA5Zu2tQNw1zNDM3kYxlCx3DB6zjovcGQeKP5X8WnOlK/pub?output=tsv";

        async function avvia() {
            try {
                const r = await fetch(linkGoogleFoglio + "&t=" + new Date().getTime());
                const testoFoglio = await r.text();
                const righe = testoFoglio.split('\n').slice(1);
                const dati = {};

                righe.forEach(riga => {
                    const col = riga.split('\t');
                    if(col.length >= 2) {
                        const loc = col[0].trim().toLowerCase();
                        if(!dati[loc]) dati[loc] = [];
                        dati[loc].push({ img: col[1].trim(), txt: col[2] ? col[2].trim() : "", dur: parseInt(col[3]) || 5000 });
                    }
                });

                const urlParams = new URLSearchParams(window.location.search);
                const locAttuale = urlParams.get('location')?.toLowerCase();

                if(!locAttuale || !dati[locAttuale]) {
                    document.getElementById('ad-text').innerText = "Location non trovata: " + locAttuale;
                    return;
                }

                const playlist = dati[locAttuale];
                let i = 0;

                function gira() {
                    const ad = playlist[i];
                    const container = document.getElementById('ad-container');
                    const testo = document.getElementById('ad-text');
                    
                    // Forza il caricamento dell'immagine
                    container.style.backgroundImage = "url('" + ad.img + "')";
                    
                    if(ad.txt) {
                        testo.style.display = "block";
                        testo.innerText = ad.txt;
                    } else {
                        testo.style.display = "none";
                    }

                    i = (i + 1) % playlist.length;
                    setTimeout(gira, ad.dur);
                }
                gira();
            } catch(e) { document.getElementById('ad-text').innerText = "Errore di connessione"; }
        }
        avvia();
    </script>
</body>
</html>
