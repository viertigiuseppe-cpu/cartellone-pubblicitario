<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="3600"> <title>Cartellone Pubblicitario Intelligente</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
            color: white; font-family: Arial, sans-serif; 
        }
        #ad-container { 
            width: 100%; height: 100%; 
            background-size: cover; background-position: center; 
            transition: background-image 1s ease-in-out; 
            display: flex; flex-direction: column; justify-content: flex-end; 
        }
        #ad-text { 
            background: rgba(0, 0, 0, 0.7); 
            padding: 20px; font-size: 30px; text-align: center; 
        }
    </style>
</head>
<body>
    <div id="ad-container">
        <div id="ad-text">Sincronizzazione col database in corso...</div>
    </div>

    <script>
        // IL TUO LINK DI GOOGLE FOGLI È INSERITO QUI:
        const linkGoogleFoglio = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRrZmErsS9XHRJG8Yrb8RmC2bJNL0SFv6fcyA5Zu2tQNw1zNDM3kYxlCx3DB6zjovcGQeKP5X8WnOlK/pub?output=tsv";

        async function avviaCartellone() {
            try {
                // 1. Scarica i dati da Google Fogli
                const response = await fetch(linkGoogleFoglio);
                if (!response.ok) throw new Error("Errore nel download dei dati");
                const data = await response.text();
                
                // 2. Trasforma il testo in un archivio di pubblicità
                const righe = data.split('\n');
                const serverCentrale = {};
                
                for(let i = 1; i < righe.length; i++) { // Parte da 1 per saltare le intestazioni
                    if(!righe[i].trim()) continue; // Salta le righe vuote
                    const colonne = righe[i].split('\t');
                    
                    // Assicurati che ci siano le colonne base
                    if (colonne.length >= 2) {
                        const location = colonne[0].trim().toLowerCase();
                        const img = colonne[1].trim();
                        const testo = colonne[2] ? colonne[2].trim() : "";
                        const durata = (colonne[3] && parseInt(colonne[3].trim())) ? parseInt(colonne[3].trim()) : 5000; // 5 sec di default
                        
                        if(!serverCentrale[location]) { serverCentrale[location] = []; }
                        serverCentrale[location].push({ img, testo, durata });
                    }
                }

                // 3. Trova la location nell'URL (es: ?location=scuola)
                const urlParams = new URLSearchParams(window.location.search);
                let locationAttuale = urlParams.get('location');

                // Controlli per mostrare messaggi di errore chiari sullo schermo
                if (!locationAttuale) {
                    document.getElementById('ad-text').innerText = "Attenzione: Manca la location nell'URL. Aggiungi ?location=nome";
                    return;
                }

                locationAttuale = locationAttuale.toLowerCase();

                if (!serverCentrale[locationAttuale]) {
                    document.getElementById('ad-text').innerText = "Nessuna pubblicità trovata nella riga di: " + locationAttuale;
                    return;
                }

                // 4. Riproduci la playlist
                const playlist = serverCentrale[locationAttuale];
                let indiceAttuale = 0;

                function cambiaPubblicita() {
                    const ad = playlist[indiceAttuale];
                    document.getElementById('ad-container').style.backgroundImage = `url('${ad.img}')`;
                    
                    // Mostra o nascondi il testo in base a come hai compilato il foglio
                    if (ad.testo && ad.testo !== "") {
                        document.getElementById('ad-text').style.display = "block";
                        document.getElementById('ad-text').innerText = ad.testo;
                    } else {
                        document.getElementById('ad-text').style.display = "none";
                    }

                    indiceAttuale = (indiceAttuale + 1) % playlist.length;
                    setTimeout(cambiaPubblicita, ad.durata);
                }

                cambiaPubblicita();

            } catch (error) {
                console.error("Errore:", error);
                document.getElementById('ad-text').innerText = "Errore: controlla di aver inserito il link TSV corretto di Google Fogli.";
            }
        }

        avviaCartellone();
    </script>
</body>
</html>
